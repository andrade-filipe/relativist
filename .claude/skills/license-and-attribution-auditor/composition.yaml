# ===================================================================
# Benchmark configuration (per ADR-0007 + ADR-0017)
# technique-evaluable: targets_scenarios MUST be non-empty.
# ===================================================================
benchmark_configuration:
  targets_scenarios:
    - prd-completeness
  benchmark_priority: tier-1
  scenario_seeding_open_item: true
  # prd-completeness is the closest available decision-coherent completeness-audit
  # scenario (checks a document artifact for required elements against a standard —
  # analogous to checking a repo for required license elements). The fit is imperfect:
  # prd-completeness carries tier:discipline in its scenario metadata while this Skill
  # is tier:technique, and its task inputs are PRD texts rather than repository states.
  # A dedicated `license-attribution-compliance-audit` scenario should be seeded by
  # the architect in a future Stage-5 cycle. See stage5_observations in
  # badges-draft.yaml for the proposed scenario shape.
  # Flagged tier-1 because this Skill anchors Dimension 2 of the open-source-readiness
  # Pack and its compliance audit methodology is discriminable by benchmark (zero-shot
  # vs. Skill-equipped produces measurably different gap-identification accuracy).

