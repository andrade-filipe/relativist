# ---------------------------------------------------------------------------
# B1 — Constants Compliance Badge (binary gate, computed on-emission).
# ---------------------------------------------------------------------------
b1_constants_compliance:
  status: passing
  checked_at: 2025-01-24
  framework_commit: n/a
  judge:
    model_id: gemini-cli
    version: 1.0
    prompt_hash: n/a
  constants_checked:
    - constant_ref: framework/constants/bounded-tool-surface.md
      verdict: passing
      rationale: |
        Skill invokes zero tools. It provides a cognitive framework and templates for
        documentation and decision recording. Pure logic/process guidance.

    - constant_ref: framework/constants/observable-agent-traces.md
      verdict: passing
      rationale: |
        The Skill produces immutable, version-controlled artifacts (ADRs, READMEs,
        structured comments). These artifacts are explicitly designed to make the
        hidden "why" of architectural decisions observable to future agents and
        human reviewers. The presence of ADR-001, ADR-002, etc. in a known directory
        provides a deterministic trace of the system's evolution.

    - constant_ref: framework/constants/minimal-sufficient-context.md
      verdict: passing
      rationale: |
        The Skill enforces "documenting the why, not the what". This directly
        honors minimal-sufficient-context by stripping away redundant explanations
        of obvious code and focusing only on the high-leverage context (constraints,
        alternatives, trade-offs) that cannot be re-derived from the source code
        itself. It prevents "context rot" by keeping documentation lean and
        focused on intent.

    - constant_ref: knowledge/software-craft/constants/dry-single-source-of-truth.md
      verdict: passing
      rationale: |
        The ADR pattern enforces a single source of truth for architectural
        decisions. Once a decision is made and recorded in an ADR, it becomes
        the authoritative reference. The Skill discourages duplicating decision
        logic across multiple files, favoring cross-references to the canonical
        ADR instead.

