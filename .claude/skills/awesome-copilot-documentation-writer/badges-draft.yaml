# ---------------------------------------------------------------------------
# B1 — Constants Compliance Badge (binary gate, computed on-emission).
# Per ADR-0007 Pillar 6, B1 is mandatory for marketplace eligibility.
# Failing B1 = not eligible. Self-checked at emission time via parser/regex
# checks (deterministic — no LLM judge involved).
# ---------------------------------------------------------------------------
b1_constants_compliance:
  status: passing
  checked_at: 2026-05-22
  framework_commit: 394432f
  judge:
    model_id: deterministic
    version: parser-rules-v1
    prompt_hash: n/a
  constants_checked:
    - constant_ref: framework/constants/bounded-tool-surface.md
      verdict: passing
      rationale: >
        Skill invokes zero tools (pure prompt scaffold). No tool calls, no external
        service invocations, no shell commands. Tool surface = 0; well within the
        constant's ceiling.

    - constant_ref: framework/constants/observable-agent-traces.md
      verdict: passing
      rationale: >
        The Skill's three-phase workflow (Acknowledge & Clarify → Propose a Structure
        → Generate Content) produces deterministic phase transition checkpoints at
        each step. Each phase gate is a named, observable event the host Agent or
        harness can log. Trace substrate is the host Agent's responsibility; this
        Skill emits structured, loggable phase boundaries.

    - constant_ref: framework/constants/minimal-sufficient-context.md
      verdict: passing
      rationale: >
        Skill injects only the Diátaxis framing scaffold: four-quadrant taxonomy
        (Tutorial / How-to / Reference / Explanation) plus the three-step workflow
        instructions. No retrieved documents, no few-shot exemplars, no auxiliary
        context injected. Minimality preserved — the scaffold adds only what is
        necessary to route the request to the correct quadrant.

    - constant_ref: framework/constants/typed-tool-contracts-with-feedback-loop.md
      verdict: passing
      rationale: >
        Vacuously honored — the constant binds on tool-using Agents; this Skill
        invokes zero tools. No tool-call contracts exist to violate. Per the
        marketplace-generator agent §2 edge-case note: for zero-tool Skills this
        framing is the correct B1 rationale; conflating the Skill's output schema
        with a tool-call contract would be a category error.

  expires_when:
    any_of:
      - framework_constants_change: true
      - source_skill_changes: true   # upstream github/awesome-copilot changes
      - days_elapsed: 180
  status_after_expiry: stale

