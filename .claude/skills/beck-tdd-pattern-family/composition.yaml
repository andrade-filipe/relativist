# ===================================================================
# Source provenance (audience: marketplace listing + attribution display)
# ===================================================================
source_provenance:
  original_author: Kent Beck
  original_url: https://www.pearson.com/en-us/subject-catalog/p/test-driven-development-by-example/P200000009421
  upstream_repo: null   # book, not a public repo
  upstream_path: null
  license: CC-BY-4.0
  license_verified_at: 2026-05-22
  fact_sheet_ref: research/articles/catalog/fact-sheets/REF-0142_2002-dev-fundamentals-beck-test-driven-development-by-example.md
  our_modifications: |
    Original framework distillation of Beck (2002) TDD: By Example. The five-
    family grouping (red-green-refactor cycle / implementation strategies /
    rhythm discipline / test organization / selection rubric) is the Skill's
    primary nudge — it consolidates Beck's ~14 named patterns into a single
    selection rubric keyed on bar state, uncertainty, and step size. The
    named patterns (Fake It Till You Make It, Triangulation, Obvious
    Implementation, Baby Steps, One Step Test, Child Test, Test List,
    Isolated Test, Assert First, red-green-refactor cycle) are Beck's; their
    grouping into five families is the framework's organizing move.

    The §3.3 stance (tests-as-design-feedback-companion, not tests-as-
    primary-design-tool) is the framework's positioning in the documented
    TDD-vs-design-first debate per research/concepts/developer-fundamentals.md
    §3.3. The Skill explicitly names the alternative-pair (design-first-
    discipline) and the legacy-rescue companion (feathers-characterization-
    tests-first) rather than silently adopting Martin's TDD-as-primary stance.
  attribution_string: "Kent Beck, Test-Driven Development: By Example, Addison-Wesley Professional, 2002."

