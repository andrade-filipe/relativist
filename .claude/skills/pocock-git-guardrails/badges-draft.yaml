# -----------------------------------------------------------------------------
# B1 — Constants Compliance Badge (binary gate, computed on-emission).
# Per ADR-0007 Pillar 6, B1 is mandatory for marketplace eligibility. Failing
# B1 = not eligible. Self-checked by marketplace-generator-sonnet at emission
# time via parser/structural checks (no LLM judge involved).
# -----------------------------------------------------------------------------
b1_constants_compliance:
  status: passing
  checked_at: 2026-05-22
  framework_commit: 5fca761
  judge:
    model_id: deterministic
    version: parser-rules-v1
    prompt_hash: n/a
  constants_checked:
    - constant_ref: framework/constants/bounded-tool-surface.md
      verdict: passing
      rationale: |
        This Skill orchestrates a bounded set of 2 ambient tool types during its
        setup procedure: Bash (for file copy, chmod, and verification) and
        Write/Edit (for settings.json modification and script customization).
        Active tool count = 2, well below the constant's ≤30 ceiling.
        tool_pruning_strategy = none-under-ceiling is legal because catalog size
        (2) is strictly below ceiling. Each tool invocation is step-scoped with
        a specific, single purpose — no unbounded tool discovery or open-ended
        catalog traversal occurs. The installed PreToolUse hook operates at the
        host harness level (not a Skill-invoked tool) and does not contribute to
        the Skill's own tool surface count.

    - constant_ref: framework/constants/observable-agent-traces.md
      verdict: passing
      rationale: |
        The setup procedure produces three observable artifacts: (1) the copied
        hook script file at a deterministic path, (2) the modified settings.json
        with the hook entry, (3) the verification step output (Step 5) which
        explicitly surfaces an exit-code 2 + BLOCKED stderr message as a typed
        observable signal. The verification step is the dedicated trace event —
        it provides a deterministic, extractable pass/fail signal before the Skill
        declares installation complete. Downstream audit: the installed hook file
        and settings.json diff are both git-trackable artifacts the operator can
        review.

    - constant_ref: framework/constants/minimal-sufficient-context.md
      verdict: passing
      rationale: |
        The Skill injects only the five-step setup procedure into the host Agent's
        context. No codebase analysis, project history, commit logs, or auxiliary
        retrieval is loaded. Each step is scoped to its minimal required action:
        one question (Step 1), one file-copy + chmod (Step 2), one JSON merge
        (Step 3), one optional customization (Step 4), one verification command
        (Step 5). The total prompt contribution from this Skill is the procedure
        text (~300 tokens) — proportionate to the task.

    - constant_ref: framework/constants/typed-tool-contracts-with-feedback-loop.md
      verdict: passing
      rationale: |
        Scoping note: the constant's formal verification assertions apply to
        `.claude/agents/*.md` files, not to Skill prompt scaffolds. This Skill
        is a setup procedure that drives the host Agent's ambient Bash and
        Write/Edit tools; the host Agent is responsible for honoring typed
        contracts on those calls.

        Within the Skill's own guidance, the typed-feedback-loop principle is
        substantively honored: Step 2 (chmod) produces a filesystem side-effect
        the operator can verify before proceeding; Step 3 (settings.json edit)
        produces a structured JSON artifact; Step 5 (verification) provides an
        explicit typed pass/fail signal — exit code 2 + "BLOCKED" stderr message.
        The Skill explicitly instructs reading the exit-code and stderr output as
        the typed result that determines whether installation succeeded. This is
        not a fire-and-forget instruction — it is a named feedback path
        (exit-code-2-with-stderr-block-message) that the operator reads before
        declaring the hook live.

        The installed hook itself reads stdin JSON (`$CLAUDE_TOOL_INPUT`),
        pattern-matches the `command` field, and emits structured stderr + typed
        exit code — a typed tool contract at the harness level, downstream of
        this Skill's install-time scope.

    - constant_ref: framework/constants/deterministic-outer-loop.md
      verdict: passing
      rationale: |
        The Skill's five-step procedure is a deterministic, linear sequence. Each
        step has a defined action and a defined exit condition. No stochastic
        branching — the only variability is the scope choice (Step 1) and optional
        customization (Step 4), both of which are explicit user decisions, not
        undeclared model choices. The sequence is fixed: ask scope → copy script →
        edit settings → customize → verify. No step may be skipped or reordered by
        the model.

  expires_when:
    any_of:
      - framework_constants_change: true
      - source_skill_changes: true  # upstream mattpocock/skills git-guardrails-claude-code updated
      - days_elapsed: 180
  status_after_expiry: stale

