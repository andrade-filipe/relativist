# ============================================================
# B1 — Constants Compliance (on-emission, structural/deterministic)
# ============================================================

b1_constants_compliance:
  overall: passing
  checks:

    - constant: context-curation-discipline
      status: passing
      rationale: >
        The readiness-orchestrator agent file declares all four pillar slots in frontmatter:
        write_substrate: filesystem, select_strategy: task-scoped-injection,
        compress_policy: none-bounded-task, isolate_mechanism: subagent-with-summary-handoff.
        The four dimension reviewer agents each declare isolate_mechanism: none-single-thread
        (legal — reviewers are single-threaded within their own context; isolation is enforced
        by the orchestrator at dispatch time). The glue/reviewer-dispatch-template.md formalizes
        the isolation invariant in a verifiable artifact. The agent bodies contain a
        ## Context Strategy section naming each pillar by mechanism. The Isolate pillar is the
        load-bearing constant for this pack — separate-context-windows per reviewer, enforced
        by the orchestrator's subagent-with-summary-handoff dispatch mechanism.

    - constant: human-approval-on-irreversible-actions
      status: passing
      rationale: >
        The readiness-remediator agent file declares:
          irreversible_action_class_list: [filesystem-file-write, git-history-rewrite,
            secret-rotation, branch-protection-rule-change]
          approval_mechanism: request-human-approval-pattern
          bypass_audit_path: log-and-halt
        The remediator body contains an ## Approval Gate section that explicitly forbids
        proceeding past an unanswered approval request and mandates two-step approval for
        git history rewrites. The readiness-orchestrator also declares an approval gate for
        dispatching the remediator (the Phase 4 human-review gate). No reviewer or aggregator
        agent performs side-effecting actions; their irreversible_action_class_list: [] is
        legal because they are read-only.

    - constant: observable-agent-traces
      status: passing
      rationale: >
        All agents declare trace_substrate: filesystem and trace_event_schema with named fields.
        The orchestrator writes to review-state/round-N/orchestrator-trace.jsonl.
        Each reviewer writes its structured output YAML (the primary trace artifact for that agent).
        The aggregator writes triage-report.yaml. The remediator writes remediation-summary.yaml.
        Every agent declares replay_protocol: trace-driven-eval-rerun (or equivalent).
        stdout-only and null trace substrates are absent.

    - constant: deterministic-outer-loop
      status: passing
      rationale: >
        All agents declare termination_predicate and step_budget in frontmatter.
        The orchestrator: termination_predicate "all_reviewers_complete && aggregation_done ||
        blocker_detected || step_count >= step_budget", step_budget: 12.
        Reviewer agents: termination_predicate "all_checklist_items_evaluated || step_count >= step_budget",
        step_budget: 8 (docs) / 8 (license) / 10 (secrets) / 10 (security-ci).
        Aggregator: step_budget: 8.
        Remediator: step_budget: 30 (bounded; one step per approved item with approval round-trip).
        escalation_target: halt-and-report on all agents. No agent delegates loop termination
        to model judgement.

    - constant: bounded-tool-surface
      status: passing
      rationale: >
        Each agent declares an explicit tool surface with named tools:
        - readiness-orchestrator: 5 tools (list_directory, read_file, write_file, invoke_agent, request_human_approval)
        - docs-readiness-reviewer: 3 tools (list_directory, read_file, grep_repo)
        - license-readiness-reviewer: 4 tools (list_directory, read_file, grep_repo, invoke_skill)
        - secrets-git-reviewer: 5 tools (list_directory, read_file, grep_repo, run_command, invoke_skill)
        - security-ci-reviewer: 4 tools (list_directory, read_file, grep_repo, invoke_skill)
        - readiness-aggregator: 2 tools (read_file, write_file)
        - readiness-remediator: 4 tools (read_file, write_file, run_command, request_human_approval)
        No agent has unbounded tool access. No web search. No external API calls.

    - constant: minimal-sufficient-context
      status: passing
      rationale: >
        The glue/reviewer-dispatch-template.md formalizes the context ceiling for each reviewer
        dispatch: (system prompt for this reviewer) + (repo path) + (output path). No peer outputs,
        no aggregator schema, no prior round state, no pre-loaded file contents are injected.
        The orchestrator's select_strategy: task-scoped-injection enforces this at dispatch time.
        The aggregator receives only the four reviewer output YAML files and triage schema.
        The remediator receives only the triage report and operator-approved item list.

