# ============================================================
# Stage-5 Observations
# ============================================================

stage5_observations:

  - kind: SCENARIO_FIT_NOTE
    artifact: generation/packs/open-source-readiness/
    reason: >
      No existing scenario in framework/scenarios/ covers the repository-state audit shape.
      The pack targets a mixed-task-class workflow (research-breadth reviewer fan-out +
      decision-coherent aggregation + decision-coherent remediation) over a repository's
      documentation, license, secrets, and security/CI surfaces. This shape is not
      discriminated by any of: multi-step-arithmetic-reasoning (decision-coherent math),
      factual-qa-with-source-citation (Q&A with retrieval), structured-output-compliance
      (schema-conformant JSON output), or architectural-refactor-identification
      (code-smell identification).
    proposed_scenario:
      scenario_id: open-source-readiness-audit
      task_class: mixed
      tier: workflow
      description: >
        Given a repository with a known set of open-source readiness gaps across the four
        dimensions (Essential Docs / License & Attribution / Secrets & Git Hygiene /
        Security & CI/Governance), measure: (1) gap recall — what fraction of planted gaps
        does the pack surface? (2) severity accuracy — are gap severity ratings aligned to
        expert judgment? (3) aggregation quality — does the triage report correctly corroborate
        cross-dimension findings? (4) remediation correctness — do the generated files close
        the declared gap?
      measurable_dimensions:
        - gap-recall
        - severity-ranking-accuracy
        - cross-dimension-corroboration
        - remediation-correctness
      candidate_refs:
        - REF-0201  # Fogel — provides the pass/fail criteria for each dimension's checklist
        - REF-0202  # opensource.guide — provides the canonical remediation actions

  - kind: STAGE5_OBSERVATION
    observation_type: area-enum-gap
    note: >
      The concept card (research/concepts/open-source-readiness.md) notes that the fact-sheet
      `Area` enum lacks an `open-source` / `project-stewardship` value (REF-0201 used ad-hoc
      `open-source`; REF-0202 filed under `meta-research`). Architect should decide whether
      to add the area value to the enum or sanction ad-hoc slugs. This does not block the
      pack emission but does affect how future skills in this domain are area-tagged.

  - kind: STAGE5_OBSERVATION
    observation_type: dim3-source-gap
    note: >
      Dimension 3 (Secrets & Git Hygiene) has two sub-surfaces (.gitignore/.env exclusion
      and pre-commit hook installation) that are grounded only in the pocock-git-guardrails
      and pocock-setup-pre-commit Skills — neither REF-0201 nor REF-0202 covers these
      sub-surfaces (flagged in the concept card). A future REF (GitHub gitignore templates /
      a pre-commit/Lefthook guide) is needed before these sub-surfaces can be promoted with
      citations. Current emission uses the Skills as proxies; the finding severity should
      be validated by the architect before sign-off.
