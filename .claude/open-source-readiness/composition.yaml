  our_modifications: >
    Specializes the adversarial-review-pipeline-pack for open-source readiness auditing.
    Four dimension reviewers (Essential Docs / License & Attribution / Secrets & Git Hygiene /
    Security & CI/Governance) replace the generic archetype set. Adds a human-approval-gated
    remediator phase downstream of aggregation. Member skills grounded in REF-0201 + REF-0202
    + the concept card's four-dimension model.
  attribution_string: >
    Context Engineering Framework, MIT license. Grounded in Fogel (REF-0201) +
    GitHub opensource.guide (REF-0202) + research/concepts/open-source-readiness.md.

benchmark_configuration:
  targets_scenarios: []
  benchmark_priority: tier-2
  scenario_seeding_open_item: true
  scenario_fit_note: >
    No existing framework/scenarios/ entry covers the repository-state audit shape
    (fan-out inspection of documentation, license, secrets, and security/CI surfaces
    in a real repository, followed by structured gap-report triage). The three seeded
    scenarios (multi-step-arithmetic-reasoning, factual-qa-with-source-citation,
    structured-output-compliance) and the later-seeded architectural-refactor-identification
    are too narrow (structured-output) or discipline-specific (refactor-identification)
    to discriminate open-source readiness audit artifacts.
    Proposed new scenario: `open-source-readiness-audit` (task_class: mixed;
    tier: workflow; measure: gap-report recall + severity-ranking accuracy + remediation
    correctness). See stage5_observation SCENARIO_FIT_NOTE in badges-draft.yaml.

constants_declared:
  - context-curation-discipline           # Isolate pillar: per-reviewer context isolation
  - human-approval-on-irreversible-actions # Remediator: gate every file write + git mutation
  - observable-agent-traces               # Per-round state persistence + replay protocol
  - deterministic-outer-loop              # Orchestrator: fixed 4-reviewer fan-out, finite budget
  - bounded-tool-surface                  # Reviewer tool ceiling (read_file / grep / list_dir)
  - minimal-sufficient-context            # Capped per-reviewer context (path + checklist + role)

