services:
  # ---------------------------------------------------------------------------
  # Default profile — coordinator + worker (v1-style; backward-compatible)
  # Usage:  docker compose up coordinator worker
  # ---------------------------------------------------------------------------
  coordinator:
    build: .
    command:
      - coordinator
      - --workers=${NUM_WORKERS:-2}
      - --bind=0.0.0.0:9000
      - --input=/data/input.bin
      - --output=/data/output.bin
      - --metrics=/data/metrics.json
    ports:
      - "9000:9000"
    volumes:
      - ./data:/data

  worker:
    build: .
    command:
      - worker
      - --coordinator=coordinator:9000
    depends_on:
      - coordinator
    deploy:
      replicas: ${NUM_WORKERS:-2}

  # ---------------------------------------------------------------------------
  # bench-tcp profile — bench runner (runs bench subcommand in TCP mode)
  # Usage:  docker compose --profile bench-tcp run --rm bench-tcp bench \
  #           --benchmark ep_annihilation --sizes 1000 --workers 2 \
  #           --chunk-size 100 --mode tcp_localhost \
  #           --csv-detail /results/detail.csv
  #
  # Env vars forwarded to CLI flags (set on host or in a .env file):
  #   CHUNK_SIZE              → --chunk-size          (default: 10000)
  #   MAX_PENDING_LIFETIME    → --max-pending-lifetime (default: 16)
  #   RECYCLE_POLICY          → --recycle-policy       (default: disable-under-delta)
  #   REPRESENTATION          → --representation       (default: dense)
  #   BENCH_SIZES             → --sizes                (default: 1000)
  #   BENCH_WORKERS           → --workers              (default: 1,2)
  #   BENCH_MODE              → --mode                 (default: tcp_localhost)
  #
  # Note: the bench subcommand handles its own TCP coordinator/worker
  # lifecycle internally in tcp_localhost mode — no separate coordinator or
  # worker containers are needed for this profile.
  # ---------------------------------------------------------------------------
  bench-tcp:
    build: .
    profiles:
      - bench-tcp
    command:
      - bench
      - --benchmark=ep_annihilation
      - --sizes=${BENCH_SIZES:-1000}
      - --workers=${BENCH_WORKERS:-1,2}
      - --mode=${BENCH_MODE:-tcp_localhost}
      - --chunk-size=${CHUNK_SIZE:-10000}
      - --max-pending-lifetime=${MAX_PENDING_LIFETIME:-16}
      - --recycle-policy=${RECYCLE_POLICY:-disable-under-delta}
      - --representation=${REPRESENTATION:-dense}
      - --csv-detail=/results/detail.csv
      - --csv-summary=/results/summary.csv
    volumes:
      - ./data:/data
      - ./results:/results
