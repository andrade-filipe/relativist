services:
  coordinator:
    build: .
    command:
      - coordinator
      - --workers=${NUM_WORKERS:-2}
      - --bind=0.0.0.0:9000
      - --input=/data/input.bin
    ports:
      - "9000:9000"
    volumes:
      - ./data:/data

  worker:
    build: .
    command:
      - worker
      - --coordinator=coordinator:9000
    depends_on:
      - coordinator
    deploy:
      replicas: ${NUM_WORKERS:-2}
