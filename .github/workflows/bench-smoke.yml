name: Bench Smoke

# TCP smoke in CI - IT-0610 series.
# Renamed from docker-bench-smoke.yml on 2026-05-05 to break a stuck
# GitHub workflow registration that was rejecting all runs in 0s.

on:
  push:
    branches: [main, develop]
    paths:
      - Dockerfile
      - docker-compose.yml
      - relativist-core/**
      - relativist-cli/**
      - .github/workflows/bench-smoke.yml
  pull_request:
    branches: [main, develop]
    paths:
      - Dockerfile
      - docker-compose.yml
      - relativist-core/**
      - relativist-cli/**
      - .github/workflows/bench-smoke.yml
  workflow_dispatch:

jobs:
  bench-smoke:
    name: TCP bench smoke (IT-0610)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t relativist:bench-smoke .

      - name: Prepare results directory
        run: mkdir -p /tmp/smoke-results

      - name: IT-0610-01 streaming bench smoke (under 180s)
        id: smoke_streaming
        run: |
          START=$(date +%s)
          BENCH_SIZES=1000 BENCH_WORKERS=1 CHUNK_SIZE=100 \
          docker compose --profile bench-tcp run --rm \
            -v /tmp/smoke-results:/results \
            bench-tcp \
            2>&1 | tee /tmp/smoke-streaming-log.txt
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "wall_clock_streaming=${ELAPSED}s"
          if [ "$ELAPSED" -gt 180 ]; then
            echo "FAIL IT-0610-01 (streaming): smoke took ${ELAPSED}s (limit: 180s on CI)"
            exit 1
          fi
          echo "PASS IT-0610-01 (streaming): smoke completed in ${ELAPSED}s"
          CSV=/tmp/smoke-results/detail.csv
          if [ ! -f "$CSV" ]; then
            echo "FAIL IT-0610-02 (streaming): detail.csv not produced"
            exit 1
          fi
          grep -q "ep_annihilation" "$CSV" || \
            { echo "FAIL IT-0610-02 (streaming): row missing"; exit 1; }
          echo "PASS IT-0610-02 (streaming): CSV row present"
          mv "$CSV" /tmp/smoke-results/detail-streaming.csv
        timeout-minutes: 3

      - name: IT-0610-01 eager bench smoke (under 180s)
        id: smoke_eager
        run: |
          START=$(date +%s)
          BENCH_SIZES=1000 BENCH_WORKERS=1 \
          docker compose --profile bench-tcp-eager run --rm \
            -v /tmp/smoke-results:/results \
            bench-tcp-eager \
            2>&1 | tee /tmp/smoke-eager-log.txt
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "wall_clock_eager=${ELAPSED}s"
          if [ "$ELAPSED" -gt 180 ]; then
            echo "FAIL IT-0610-01 (eager): smoke took ${ELAPSED}s (limit: 180s on CI)"
            exit 1
          fi
          echo "PASS IT-0610-01 (eager): smoke completed in ${ELAPSED}s"
          CSV=/tmp/smoke-results/detail.csv
          if [ ! -f "$CSV" ]; then
            echo "FAIL IT-0610-02 (eager): detail.csv not produced"
            exit 1
          fi
          grep -q "ep_annihilation" "$CSV" || \
            { echo "FAIL IT-0610-02 (eager): row missing"; exit 1; }
          echo "PASS IT-0610-02 (eager): CSV row present"
        timeout-minutes: 3

      - name: IT-0610-03 free_list witness (debug log run)
        run: |
          BENCH_SIZES=100 BENCH_WORKERS=1 \
          RUST_LOG="relativist_core=debug" \
          docker compose --profile bench-tcp run --rm \
            -v /tmp/smoke-results:/results \
            bench-tcp \
            2>&1 | tee /tmp/smoke-debug-log.txt
          test -f /tmp/smoke-results/detail.csv || \
            { echo "FAIL IT-0610-03: CSV missing"; exit 1; }
          echo "PASS IT-0610-03 (docker-compose smoke)"
        timeout-minutes: 3

      - name: Smoke gate summary
        run: |
          echo "All bench-smoke gates PASSED."

  rust-integration-tcp-smoke:
    name: Rust TCP smoke tests (IT-0610-04..06)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run default tests (includes IT-0610-05)
        run: cargo test --test integration_tcp_bench_smoke

      - name: Run ignored integration smoke tests (IT-0610-04, IT-0610-06)
        run: cargo test --test integration_tcp_bench_smoke -- --include-ignored
        timeout-minutes: 8
