name: CI

# The REQUIRED gate. Strictly essential, fast (~2-3 min): code quality + the
# core engine/distribution correctness via the library unit tests (which include
# ~90 run_grid / G1 tests in the merge module). It deliberately does NOT run the
# integration test binaries under tests/ (example codecs like Horner, the
# benchmark harness, end-to-end smokes) — those are the OPTIONAL tier and run in
# extended-tests.yml (manual / scheduled, non-blocking) or via plain `cargo test`
# locally. See docs/TESTING.md.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      # Clippy compiles all targets (incl. tests) under all features but does not
      # run them — so it stays fast while still linting the whole tree.
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # SPEC-22 R23: SparseNet MUST NOT be imported in src/reduction/. The
      # reduction engine relies on O(1) indexed Vec access; HashMap has a 5-10×
      # constant-factor overhead. (QA-D009-011: catches wildcard imports, type
      # aliases, and direct path expressions, not just `use ... SparseNet`.)
      - name: Lint — SparseNet import boundary (SPEC-22 R23)
        run: |
          if grep -rn \
            -e "use crate::net::sparse::SparseNet" \
            -e "use crate::net::SparseNet" \
            -e "net::sparse::SparseNet" \
            -e "use crate::net::\*" \
            -e "SparseNet" \
            relativist-core/src/reduction/; then
            echo "ERROR: SparseNet import or reference found in src/reduction/ — violates SPEC-22 R23."
            exit 1
          fi
          echo "OK: no SparseNet imports in src/reduction/ (SPEC-22 R23 satisfied)."

      # SPEC-22 R31: SPEC-22 implementation files must contain no unsafe code.
      - name: Lint — safe-Rust-only audit (SPEC-22 R31)
        run: |
          if grep -rn \
            -e "unsafe[[:space:]]*{" \
            -e "unsafe[[:space:]]\+fn\b" \
            -e "unsafe[[:space:]]\+impl\b" \
            -e "unsafe[[:space:]]\+trait\b" \
            -e "unsafe[[:space:]]\+extern\b" \
            relativist-core/src/net/ \
            relativist-core/src/partition/ \
            relativist-core/src/merge/ \
            relativist-core/src/reduction/; then
            echo "ERROR: unsafe code found in SPEC-22 implementation files (SPEC-22 R31)."
            exit 1
          fi
          echo "OK: no unsafe code in SPEC-22 implementation files (SPEC-22 R31 satisfied)."

      # ESSENTIAL correctness: the library unit tests. Covers the reduction
      # engine, partition/merge, and the fundamental property G1 (reduce_all ≅
      # run_grid) via the merge module's run_grid tests. Fast: ~30s.
      - name: Test (library unit tests)
        run: cargo test --lib

      # Validate the streaming-no-recycle compile-time feature column still
      # compiles and its library tests pass (SPEC-21 R37b). Also fast with --lib.
      - name: Test (library, streaming-no-recycle feature)
        run: cargo test --lib --features streaming-no-recycle

      - name: Build release
        run: cargo build --release

  # Supply-chain advisory scan (RustSec). Runs in PARALLEL with `check`, so it
  # does not slow the essential gate. Informational: do NOT add this job's check
  # as a required status check — a new upstream advisory is independent of a PR's
  # code and should not block unrelated work. Dependabot opens the fix PRs.
  audit:
    name: Security audit (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
